# Original idea by @ISnackable. Thanks to him for handling the hardest parts!
# https://github.com/ISnackable/YTCubePlus/blob/main/.github/workflows/Build.yml

name: Build and Release uYouEnhanced

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "17.5"
        required: true
        type: string
      uyou_version:
        description: "uYou Version"
        default: "3.0.4"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL of the decrypted YouTube IPA"
        default: ""
        required: true
        type: string
      bundle_id:
        description: "Modify the bundle ID"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Modify the app name"
        default: "YouTube"
        required: true
        type: string
      commit_id:
        description: "(Optional) Commit ID to build at"
        default: ""
        required: false
        type: string
      upload_artifact:
        description: "Upload IPA as artifact"
        default: false
        required: false
        type: boolean
      create_release:
        description: "Create a draft release"
        default: true
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build uYouEnhanced
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout Main
        uses: actions/checkout@v4
        with:
          path: main
          ref: ${{ github.event.inputs.commit_id || github.ref }}


      - name: Install Dependencies
        run: brew install ldid dpkg make

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: SDK Caching
        id: SDK
        uses: actions/cache@v4
        env:
          cache-name: iOS-${{ inputs.sdk_version }}-SDK
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Download iOS SDK
        if: steps.SDK.outputs.cache-hit != 'true'
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/aricloverALT/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS${{ inputs.sdk_version }}.sdk
          git checkout
          mv *.sdk $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Setup Theos Jailed
        uses: actions/checkout@v4
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: |
          ./theos-jailed/install
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Vendor YouTubeHeader
        # aricloverEXTRA/YouTubeHeader が非公開化されたときの対策として
        # リポジトリに YouTubeHeader を直接取得してvendor化する。
        # clone成功 → そのまま使用
        # clone失敗 → arichornlover/uYouEnhanced の theos include から取得
        run: |
          TARGET="main/Tweaks/YouTubeHeader"
          # 親ディレクトリだけ作る（cloneのdestinationを事前に作ると失敗するため）
          mkdir -p "$(dirname "$TARGET")"

          # まず aricloverEXTRA から取得を試みる
          if git clone --quiet --depth=1 https://github.com/aricloverEXTRA/YouTubeHeader.git "$TARGET"; then
            echo "YouTubeHeader: OK (aricloverEXTRA)"
            rm -rf "$TARGET/.git"
          else
            echo "YouTubeHeader: aricloverEXTRA failed, trying arichornlover mirror..."
            # return codeベースで判定（空ディレクトリ残存の誤検知を防ぐ）
            if git clone --quiet --depth=1 --filter=blob:none --sparse               https://github.com/arichornlover/uYouEnhanced.git /tmp/uyou_upstream; then
              cd /tmp/uyou_upstream
              git sparse-checkout set Tweaks/YouTubeHeader
              git checkout
              cd -
              cp -r /tmp/uyou_upstream/Tweaks/YouTubeHeader/. "$TARGET/"
              rm -rf /tmp/uyou_upstream
              echo "YouTubeHeader: OK (arichornlover mirror)"
            else
              echo "YouTubeHeader: WARNING - all sources failed"
            fi
          fi

      - name: Clone Submodules directly
        # .git が存在しないリポジトリ（zipからpushされたもの）では
        # git submodule update が動かないため .gitmodules をパースして直接 clone する。
        # clone に失敗したサブモジュールは Makefile から自動除外してビルドを継続する。
        run: |
          python3 - << 'PYEOF'
          import subprocess, os, re

          # Vendor YouTubeHeader ステップで取得済みのためスキップ
          SKIP_PATHS = {"Tweaks/YouTubeHeader"}

          FALLBACKS = {
              "Tweaks/YouTimeStamp": ["https://github.com/PoomSmart/YouTimeStamp.git"],
          }

          def try_clone(urls, path, branch=None):
              for url in urls:
                  # 親ディレクトリだけ作る（cloneのdestinationを事前に作ると失敗するため）
                  os.makedirs(os.path.dirname(path), exist_ok=True)
                  cmd = ["git", "clone", "--quiet", "--depth=1", "--recurse-submodules"]
                  if branch:
                      cmd += ["--branch", branch]
                  cmd += [url, path]
                  r = subprocess.run(cmd, capture_output=True, text=True)
                  if r.returncode == 0:
                      print(f"  OK: {url}")
                      # nested git repo 問題を防ぐ
                      git_dir = os.path.join(path, ".git")
                      if os.path.exists(git_dir):
                          import shutil; shutil.rmtree(git_dir)
                      return True
                  print(f"  FAIL ({url}): {r.stderr.strip()[:120]}")
              return False

          def remove_from_makefile(tweak_path):
              name = tweak_path.split("/")[-1]
              mf = open("main/Makefile").read()
              mf = re.sub(rf"[ \t]*{re.escape(tweak_path)}\b", "", mf)
              mf = re.sub(rf"[ \t]*\$\(THEOS_OBJ_DIR\)/{re.escape(name)}\.dylib[ \t]*\\?\n", "\n", mf)
              open("main/Makefile", "w").write(mf)
              print(f"  => Removed {tweak_path} from Makefile")

          gitmodules = open("main/.gitmodules").read()
          blocks = re.split(r'\[submodule\s+"[^"]+"\]', gitmodules)[1:]

          for block in blocks:
              pm = re.search(r'path\s*=\s*(.+)', block)
              um = re.search(r'url\s*=\s*(.+)', block)
              bm = re.search(r'branch\s*=\s*(.+)', block)
              if not pm or not um:
                  continue
              path   = pm.group(1).strip()
              url    = um.group(1).strip()
              branch = bm.group(1).strip() if bm else None
              if path in SKIP_PATHS:
                  print(f"Skipping (vendored): {path}")
                  continue

              target = os.path.join("main", path)
              if os.path.isdir(target) and os.listdir(target):
                  print(f"Already exists: {path}")
                  continue
              print(f"Cloning {path} ...")
              if not try_clone([url] + FALLBACKS.get(path, []), target, branch):
                  print(f"  WARNING: all URLs failed for {path} - removing from Makefile")
                  remove_from_makefile(path)
          PYEOF


      - name: Patch missing YouTubeHeader stubs
        # cloneしたYouTubeHeaderに不足しているヘッダをスタブとして自動生成する。
        #
        # 設計上の注意:
        #   - プロパティ・メソッドのAPI compatibilityは保証しない
        #     （aricloverEXTRA/YouTubeHeader が取得できれば不要なステップ）
        #   - 非classヘッダ（typedef/enum/protocol）は個別対応が必要
        #     → "unknown type name" 系エラーが出たらスタブを拡張する
        run: |
          HEADER_DIR="main/Tweaks/YouTubeHeader"
          mkdir -p "$HEADER_DIR"

          # 全ソースから import されているヘッダ名を収集
          NEEDED=$(grep -rh "#import.*YouTubeHeader/"             main/Sources/ main/Tweaks/ 2>/dev/null             | grep -o 'YouTubeHeader/[^"]*\.h'             | sed 's|YouTubeHeader/||'             | sort -u)

          STUB_COUNT=0
          SKIP_COUNT=0
          for HEADER in $NEEDED; do
            # 1. 正規の配置場所に存在するか確認
            if [ -f "$HEADER_DIR/$HEADER" ]; then
              continue
            fi

            # 2. ディレクトリ構造が変わって別の場所にある場合を検知
            #    （誤stub生成を防ぐ）
            FOUND_ELSEWHERE=$(find main/Tweaks/ -name "$HEADER" ! -path "$HEADER_DIR/$HEADER" 2>/dev/null | head -1)
            if [ -n "$FOUND_ELSEWHERE" ]; then
              echo "  SKIP (found elsewhere): $HEADER -> $FOUND_ELSEWHERE"
              SKIP_COUNT=$((SKIP_COUNT + 1))
              continue
            fi

            # 3. ヘッダ名からクラス名を推定してスタブ生成
            CLASS=$(basename "$HEADER" .h)
            cat > "$HEADER_DIR/$HEADER" << STUB
// Auto-generated stub: $HEADER
# Original idea by @ISnackable. Thanks to him for handling the hardest parts!
# https://github.com/ISnackable/YTCubePlus/blob/main/.github/workflows/Build.yml

name: Build and Release uYouEnhanced

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "17.5"
        required: true
        type: string
      uyou_version:
        description: "uYou Version"
        default: "3.0.4"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL of the decrypted YouTube IPA"
        default: ""
        required: true
        type: string
      bundle_id:
        description: "Modify the bundle ID"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Modify the app name"
        default: "YouTube"
        required: true
        type: string
      commit_id:
        description: "(Optional) Commit ID to build at"
        default: ""
        required: false
        type: string
      upload_artifact:
        description: "Upload IPA as artifact"
        default: false
        required: false
        type: boolean
      create_release:
        description: "Create a draft release"
        default: true
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build uYouEnhanced
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout Main
        uses: actions/checkout@v4
        with:
          path: main
          ref: ${{ github.event.inputs.commit_id || github.ref }}

      - name: Install Dependencies
        run: brew install ldid dpkg make

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: SDK Caching
        id: SDK
        uses: actions/cache@v4
        env:
          cache-name: iOS-${{ inputs.sdk_version }}-SDK
        with:
          path: theos/sdks/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Download iOS SDK
        if: steps.SDK.outputs.cache-hit != 'true'
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/aricloverALT/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS${{ inputs.sdk_version }}.sdk
          git checkout
          mv *.sdk $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Setup Theos Jailed
        uses: actions/checkout@v4
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed
          submodules: recursive

      - name: Install Theos Jailed
        run: |
          ./theos-jailed/install
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Vendor YouTubeHeader
        run: |
          TARGET="main/Tweaks/YouTubeHeader"
          mkdir -p "$(dirname "$TARGET")"

          if git clone --quiet --depth=1 https://github.com/aricloverEXTRA/YouTubeHeader.git "$TARGET"; then
            echo "YouTubeHeader: OK (aricloverEXTRA)"
            rm -rf "$TARGET/.git"
          else
            echo "YouTubeHeader: aricloverEXTRA failed, trying arichornlover mirror..."
            if git clone --quiet --depth=1 --filter=blob:none --sparse \
              https://github.com/arichornlover/uYouEnhanced.git /tmp/uyou_upstream; then
              cd /tmp/uyou_upstream
              git sparse-checkout set Tweaks/YouTubeHeader
              git checkout
              cd -
              cp -r /tmp/uyou_upstream/Tweaks/YouTubeHeader/. "$TARGET/"
              rm -rf /tmp/uyou_upstream
              echo "YouTubeHeader: OK (arichornlover mirror)"
            else
              echo "YouTubeHeader: WARNING - all sources failed"
            fi
          fi

      - name: Clone Submodules directly
        run: |
          python3 - << 'PYEOF'
          import subprocess, os, re, shutil

          SKIP_PATHS = {"Tweaks/YouTubeHeader"}

          FALLBACKS = {
              "Tweaks/YouTimeStamp": ["https://github.com/PoomSmart/YouTimeStamp.git"],
          }

          def try_clone(urls, path, branch=None):
              for url in urls:
                  os.makedirs(os.path.dirname(path), exist_ok=True)
                  cmd = ["git", "clone", "--quiet", "--depth=1", "--recurse-submodules"]
                  if branch:
                      cmd += ["--branch", branch]
                  cmd += [url, path]
                  r = subprocess.run(cmd, capture_output=True, text=True)
                  if r.returncode == 0:
                      print(f"  OK: {url}")
                      git_dir = os.path.join(path, ".git")
                      if os.path.exists(git_dir):
                          shutil.rmtree(git_dir)
                      return True
                  print(f"  FAIL ({url}): {r.stderr.strip()[:120]}")
              return False

          def remove_from_makefile(tweak_path):
              name = tweak_path.split("/")[-1]
              mf = open("main/Makefile").read()
              mf = re.sub(rf"[ \t]*{re.escape(tweak_path)}\b", "", mf)
              mf = re.sub(rf"[ \t]*\$\(THEOS_OBJ_DIR\)/{re.escape(name)}\.dylib[ \t]*\\?\n", "\n", mf)
              open("main/Makefile", "w").write(mf)
              print(f"  => Removed {tweak_path} from Makefile")

          gitmodules = open("main/.gitmodules").read()
          blocks = re.split(r'\[submodule\s+"[^"]+"\]', gitmodules)[1:]

          for block in blocks:
              pm = re.search(r'path\s*=\s*(.+)', block)
              um = re.search(r'url\s*=\s*(.+)', block)
              bm = re.search(r'branch\s*=\s*(.+)', block)
              if not pm or not um:
                  continue
              path   = pm.group(1).strip()
              url    = um.group(1).strip()
              branch = bm.group(1).strip() if bm else None
              if path in SKIP_PATHS:
                  print(f"Skipping (vendored): {path}")
                  continue
              target = os.path.join("main", path)
              if os.path.isdir(target) and os.listdir(target):
                  print(f"Already exists: {path}")
                  continue
              print(f"Cloning {path} ...")
              if not try_clone([url] + FALLBACKS.get(path, []), target, branch):
                  print(f"  WARNING: all URLs failed for {path} - removing from Makefile")
                  remove_from_makefile(path)
          PYEOF

      - name: Patch missing YouTubeHeader stubs
        run: |
          python3 - << 'PYEOF'
          import os, subprocess, re

          HEADER_DIR = "main/Tweaks/YouTubeHeader"
          os.makedirs(HEADER_DIR, exist_ok=True)

          result = subprocess.run(
              ["grep", "-rh", "--include=*.h", "--include=*.m",
               "--include=*.x", "--include=*.xm",
               "-e", "#import.*YouTubeHeader/",
               "main/Sources/", "main/Tweaks/"],
              capture_output=True, text=True
          )
          needed = set(re.findall(r'YouTubeHeader/([^"]+\.h)', result.stdout))

          stub_count = 0
          skip_count = 0
          for header in sorted(needed):
              target = os.path.join(HEADER_DIR, header)
              if os.path.exists(target):
                  continue
              found_elsewhere = subprocess.run(
                  ["find", "main/Tweaks/", "-name", header, "!", "-path", target],
                  capture_output=True, text=True
              ).stdout.strip()
              if found_elsewhere:
                  print(f"  SKIP (found elsewhere): {header} -> {found_elsewhere}")
                  skip_count += 1
                  continue
              class_name = os.path.splitext(header)[0]
              stub = (
                  f"@class {class_name};\n"
                  f"@interface {class_name} : NSObject\n"
                  f"@end\n"
              )
              open(target, "w").write(stub)
              print(f"  STUB: {header}")
              stub_count += 1

          print(f"==> {stub_count} stub(s) generated, {skip_count} skipped")
          PYEOF

      - name: Prepare YouTube IPA
        id: prepare_youtube
        run: |
          wget "${{ inputs.decrypted_youtube_url }}" --quiet --no-verbose -O main/YouTube.ipa
          cd ${{ github.workspace }}/main
          mv YouTube.ipa YouTube.zip
          unzip -q YouTube.zip
          youtube_version=$(defaults read "$(pwd)/Payload/YouTube.app/Info" CFBundleVersion)
          echo "==> YouTube v${youtube_version} downloaded"
          sed -i '' "19s#.*#YOUTUBE_VERSION = ${youtube_version}#g" Makefile
          echo "youtube_version=${youtube_version}" >> $GITHUB_OUTPUT
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Fix compiling & Build Package
        id: build_package
        run: |
          cd ${{ github.workspace }}/main
          sed -i '' "1s#.*#export TARGET = iphone:clang:${{ inputs.sdk_version }}:14.0#g" Makefile
          sed -i '' "29s#.*#DISPLAY_NAME = ${{ inputs.app_name }}#g" Makefile
          sed -i '' "30s#.*#BUNDLE_ID = ${{ inputs.bundle_id }}#g" Makefile
          make package THEOS_PACKAGE_SCHEME=rootless IPA=Payload/YouTube.app FINALPACKAGE=1
          echo "package=$(ls -t packages | head -n1)" >> $GITHUB_OUTPUT
          echo -e "==> \033[1mSHASUM256: $(shasum -a 256 packages/*.ipa | cut -f1 -d' ')\033[0m"
          echo -e "==> \033[1mBundle ID: ${{ inputs.bundle_id }}\033[0m"
        env:
          THEOS: ${{ github.workspace }}/theos
          UYOU_VERSION: ${{ inputs.uyou_version }}

      - name: Upload Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: uYouEnhanced_${{ steps.prepare_youtube.outputs.youtube_version }}_${{ inputs.uyou_version }}
          path: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Create Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.prepare_youtube.outputs.youtube_version }}-${{ inputs.uyou_version }}-(${{ github.run_number }})
          name: v${{ steps.prepare_youtube.outputs.youtube_version }}-${{ inputs.uyou_version }}-(${{ github.run_number }})
          files: main/packages/*.ipa
          draft: true
